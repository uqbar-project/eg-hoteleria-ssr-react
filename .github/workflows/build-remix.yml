name: Build Remix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter remix exec tsc --noEmit
      - run: pnpm --filter remix build
      - run: pnpm vitest run --coverage "--coverage.include=remix/**/*.ts" "--coverage.include=shared/**/*.ts" remix/__tests__/
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: uqbar-project/eg-hoteleria-ssr-react
          flags: remix
          fail_ci_if_error: true
